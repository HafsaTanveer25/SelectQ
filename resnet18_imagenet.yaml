seed: 42
save_dir: outputs/resnet18_w4a4_selectq

dataset:
  root: /path/to/imagenet
  num_workers: 8
  train_batch_size_stats: 64
  val_batch_size: 128
  image_size: 224

model:
  name: resnet18
  pretrained: true
  num_classes: 1000

selectq:
  centroid_count: 10
  gamma: 1.0
  lambda_min: 0.001
  lambda_max: 0.1
  update_pass_max_samples: 30000
  ranking_pass_max_samples: 50000
  calibration_size: 1000
  random_init_samples: 64

quant:
  weight_bits: 4
  activation_bits: 4
  use_asymmetric: true
  calibrate_batches: -1
  eval_on_cpu: false

eval:
  print_freq: 50
